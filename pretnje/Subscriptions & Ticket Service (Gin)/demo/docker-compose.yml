version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gin_attack_db
    environment:
      POSTGRES_USER: ginuser
      POSTGRES_PASSWORD: ginpassword
      POSTGRES_DB: gin_attack_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ginuser -d gin_attack_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app-scenario1:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MAIN_FILE: main.go
    container_name: gin_app_scenario1
    restart: on-failure
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ginuser
      DB_PASSWORD: ginpassword
      DB_NAME: gin_attack_db
      GIN_MODE: release
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

  app-scenario2:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MAIN_FILE: main_proxy_dos.go
    container_name: gin_app_scenario2
    restart: on-failure
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ginuser
      DB_PASSWORD: ginpassword
      DB_NAME: gin_attack_db
      GIN_MODE: release
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy

  app-scenario3:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MAIN_FILE: main_secure.go
    container_name: gin_app_scenario3
    restart: on-failure
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ginuser
      DB_PASSWORD: ginpassword
      DB_NAME: gin_attack_db
      GIN_MODE: release
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
